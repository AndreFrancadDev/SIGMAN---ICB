<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>SIGMAN ICB/UPE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>SIGMAN</h1>
  <h2>Sistema Integrado de Gestão de Manutenção</h2>

  <form>
    <label>Setor:</label>
    <input type="text" placeholder="Ex: Coordenação, Sala 12, Laboratório">

    <label>Tipo de problema:</label>
    <select>
      <option>Elétrica</option>
      <option>Hidráulica</option>
      <option>Ar-condicionado</option>
      <option>Elevador</option>
      <option>Câmera</option>
      <option>Infraestrutura>
      <option>Lampada>
      <option>Tomada
      <option>Outro</option>
    </select>

    <label>Descrição:</label>
    <textarea placeholder="Descreva o problema"></textarea>

    <button type="submit">Enviar chamado</button>
  </form>
</body>
</html>
